<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="TaschenrechnerDesign.css">
</head>
<body>
    <div class="calculator">
        <!-- Anzeige des Taschenrechners -->
        <div class="display"> 
            <input type="text" id="display" disabled>
        </div>

        <!-- Tasten des Taschenrechners -->
        <div class="buttons">
            <button value="7">7</button>
            <button value="8">8</button>
            <button value="9">9</button>
            <button value="/">/</button>
            <button value="4">4</button>
            <button value="5">5</button>
            <button value="6">6</button>
            <button value="*">*</button>
            <button value="1">1</button>
            <button value="2">2</button>
            <button value="3">3</button>
            <button value="-">-</button>
            <button value="0">0</button>
            <button value="C">C</button>
            <button value="=">=</button>
            <button value="+">+</button>
            <button value="backspace">←</button>
            <button value="(" >(</button>
            <button value=")">)</button>
            <button value=".">.</button>
            <button value="Wurzel">√</button>
            <button value="%">%</button> 
            <button value="**">**</button>
        </div>
    </div>
</body>

<!-- JavaScript für die Funktionalität des Taschenrechners (Wurzel und Prozent werden direkt berechnet) -->
<script>
    const display = document.getElementById("display");
    const buttons = document.querySelectorAll("button");
    buttons.forEach(button => {
        button.addEventListener("click", () => {
            const value = button.value;
            if (value === "C") {
                display.value = "";
            }
            else if (value === "Wurzel") {
                try {
                    display.value = Math.sqrt(display.value);
                }
                catch (error) {
                    display.value = "Error";
                }
            }
            else if (value === "**") {
                display.value = display.value + "**";
            }
            else if (value === "%") {
                try {
                    display.value = eval(display.value) / 100;
                }
                catch (error) {
                    display.value = "Error";
                }
            }
            else if (value === "backspace") {
                display.value = display.value.slice(0, -1);
            }
            else if (value === "=") {
                try {
                    display.value = eval(display.value);
                }
                catch (error) {
                    display.value = "Error";
                }
            }
            else {
                display.value += value;
            }
        });
    });
</script>
</html>
